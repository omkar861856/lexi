<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecotron Lexi | Random Word Generator</title>
    <meta name="description" content="Generate random words for creative writing, games, or inspiration.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://developdomicile.com/34/b7/8a/34b78a6058ed52a0e19d05b2037cb2d5.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Ecotron Lexi</h1>
            <p>Spark your creativity with a single click.</p>
        </header>

        <main>
            <div class="word-display" id="word-output">Inspire</div>
            
            <div class="controls">
                <div class="config">
                    <label>Number of words:</label>
                    <input type="number" id="word-count" value="1" min="1" max="10">
                </div>
                <button onclick="generateWords()" class="action-btn">Generate</button>
            </div>

            <div id="word-list" class="word-list"></div>

            <!-- Native Banner -->
            <div class="ad-container" style="margin-top: 2rem;">
                <script async="async" data-cfasync="false" src="https://developdomicile.com/2cd7e1ac2db1a93913a72db3d131e3b0/invoke.js"></script>
                <div id="container-2cd7e1ac2db1a93913a72db3d131e3b0"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Ecotron Infrastructure</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
