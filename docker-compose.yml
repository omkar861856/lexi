services:
  ecotron-lexi:
    build: .
    container_name: ecotron-lexi
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.ecotron-lexi.rule=Host(`lexi.ecotron.co.in`)"
      - "traefik.http.routers.ecotron-lexi.entrypoints=websecure"
      - "traefik.http.routers.ecotron-lexi.tls.certresolver=myresolver"
      - "traefik.http.services.ecotron-lexi.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
